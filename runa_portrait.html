<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Runa at the University of Yggdrasil — Class of 2040</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;600&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #0a0a12;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Raleway', sans-serif;
    overflow: hidden;
  }
  
  .portrait {
    width: 600px;
    height: 900px;
    background: linear-gradient(170deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #1a1a2e 100%);
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(100, 150, 255, 0.15), 0 0 120px rgba(100, 150, 255, 0.05);
  }
  
  /* Rune border */
  .rune-border {
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(200, 170, 110, 0.3);
    border-radius: 8px;
    pointer-events: none;
    z-index: 10;
  }
  
  .rune-border::before {
    content: 'ᚠ ᚢ ᚦ ᚨ ᚱ ᚲ ᚷ ᚹ ᚺ ᚾ ᛁ ᛃ ᛇ ᛈ ᛉ ᛊ ᛏ ᛒ ᛖ ᛗ ᛚ ᛜ ᛞ ᛟ';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    color: rgba(200, 170, 110, 0.04);
    letter-spacing: 12px;
    white-space: nowrap;
  }
  
  /* Background tree */
  .yggdrasil {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 400px;
    height: 700px;
    opacity: 0.06;
    z-index: 1;
  }
  
  .yggdrasil::before {
    content: '';
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 500px;
    background: linear-gradient(to top, rgba(150, 200, 150, 0.8), rgba(100, 180, 100, 0.2));
    border-radius: 2px;
  }
  
  /* University building silhouette */
  .building {
    position: absolute;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    height: 350px;
    z-index: 2;
  }
  
  .building .roof {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 120px solid transparent;
    border-right: 120px solid transparent;
    border-bottom: 80px solid rgba(40, 50, 70, 0.8);
    filter: drop-shadow(0 0 20px rgba(100, 150, 255, 0.1));
  }
  
  .building .facade {
    position: absolute;
    top: 78px;
    left: 50%;
    transform: translateX(-50%);
    width: 240px;
    height: 200px;
    background: linear-gradient(180deg, rgba(30, 40, 60, 0.9), rgba(20, 30, 50, 0.95));
    border: 1px solid rgba(200, 170, 110, 0.2);
    border-top: 3px solid rgba(200, 170, 110, 0.4);
  }
  
  .building .door {
    position: absolute;
    top: 110px;
    left: 50%;
    transform: translateX(-50%);
    width: 36px;
    height: 70px;
    background: linear-gradient(180deg, rgba(200, 170, 110, 0.3), rgba(150, 130, 80, 0.2));
    border-radius: 18px 18px 0 0;
    border: 1px solid rgba(200, 170, 110, 0.3);
  }
  
  .building .door::before {
    content: 'ᛟ';
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(200, 170, 110, 0.5);
    font-size: 16px;
  }
  
  .building .window {
    position: absolute;
    width: 24px;
    height: 30px;
    background: rgba(100, 150, 255, 0.15);
    border: 1px solid rgba(200, 170, 110, 0.15);
    border-radius: 12px 12px 0 0;
  }
  
  .building .window:nth-child(4) { top: 95px; left: 185px; }
  .building .window:nth-child(5) { top: 95px; left: 215px; }
  .building .window:nth-child(6) { top: 95px; right: 185px; }
  .building .window:nth-child(7) { top: 95px; right: 215px; }
  
  /* Dragon prow on roof */
  .dragon-prow {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%) rotate(0deg);
    width: 30px;
    height: 30px;
    z-index: 3;
  }
  
  .dragon-prow::before {
    content: '🐉';
    font-size: 24px;
  }
  
  /* Runestones */
  .runestone {
    position: absolute;
    bottom: 120px;
    width: 20px;
    height: 40px;
    background: linear-gradient(180deg, rgba(80, 90, 100, 0.8), rgba(60, 70, 80, 0.6));
    border-radius: 10px 10px 3px 3px;
    z-index: 3;
  }
  
  .runestone.left { left: 80px; }
  .runestone.right { right: 80px; }
  
  .runestone::after {
    content: 'ᚠ';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(200, 170, 110, 0.6);
    font-size: 10px;
  }
  
  .runestone.right::after { content: 'ᛟ'; }
  
  /* Holographic displays */
  .holo {
    position: absolute;
    bottom: 160px;
    width: 50px;
    height: 30px;
    background: rgba(100, 150, 255, 0.08);
    border: 1px solid rgba(100, 150, 255, 0.2);
    border-radius: 3px;
    z-index: 3;
    animation: holoPulse 3s ease-in-out infinite;
  }
  
  .holo.left { left: 120px; animation-delay: 0s; }
  .holo.right { right: 120px; animation-delay: 1.5s; }
  
  @keyframes holoPulse {
    0%, 100% { opacity: 0.3; border-color: rgba(100, 150, 255, 0.2); }
    50% { opacity: 0.6; border-color: rgba(100, 150, 255, 0.4); }
  }
  
  /* Runa character */
  .runa {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
  }
  
  /* Hair */
  .hair {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 140px;
    background: linear-gradient(180deg, #f0d060 0%, #e8c840 40%, #d4a830 100%);
    border-radius: 55px 55px 30px 30px;
    z-index: 4;
    animation: hairSway 4s ease-in-out infinite;
  }
  
  .hair::before {
    content: '';
    position: absolute;
    top: 10px;
    left: -15px;
    width: 45px;
    height: 120px;
    background: linear-gradient(180deg, #f0d060, #d4a830);
    border-radius: 25px 0 15px 30px;
    transform: rotate(-5deg);
  }
  
  .hair::after {
    content: '';
    position: absolute;
    top: 10px;
    right: -15px;
    width: 45px;
    height: 120px;
    background: linear-gradient(180deg, #f0d060, #d4a830);
    border-radius: 0 25px 30px 15px;
    transform: rotate(5deg);
  }
  
  @keyframes hairSway {
    0%, 100% { transform: translateX(-50%) rotate(-0.5deg); }
    50% { transform: translateX(-50%) rotate(0.5deg); }
  }
  
  /* Face */
  .face {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 75px;
    height: 90px;
    background: linear-gradient(180deg, #e8c490 0%, #d4a870 100%);
    border-radius: 37px 37px 30px 30px;
    z-index: 6;
    box-shadow: inset 0 -10px 20px rgba(200, 150, 100, 0.1);
  }
  
  /* Eyes */
  .eye {
    position: absolute;
    top: 32px;
    width: 14px;
    height: 14px;
    background: radial-gradient(circle, #a0d8f0 30%, #6bb8e0 60%, #4090c0 100%);
    border-radius: 50%;
    z-index: 7;
    box-shadow: 0 0 8px rgba(160, 216, 240, 0.4);
  }
  
  .eye::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 3px;
    width: 5px;
    height: 5px;
    background: #1a3050;
    border-radius: 50%;
  }
  
  .eye.left { left: 15px; }
  .eye.right { right: 15px; }
  
  /* Eyebrows */
  .brow {
    position: absolute;
    top: 26px;
    width: 18px;
    height: 3px;
    background: #c4a040;
    border-radius: 2px;
    z-index: 7;
  }
  .brow.left { left: 13px; transform: rotate(-5deg); }
  .brow.right { right: 13px; transform: rotate(5deg); }
  
  /* Nose */
  .nose {
    position: absolute;
    top: 45px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 12px;
    background: linear-gradient(180deg, rgba(200,160,120,0.3), rgba(180,140,100,0.1));
    border-radius: 50%;
    z-index: 7;
  }
  
  /* Lips */
  .lips {
    position: absolute;
    top: 65px;
    left: 50%;
    transform: translateX(-50%);
    width: 22px;
    height: 8px;
    background: #c47070;
    border-radius: 50%;
    z-index: 7;
  }
  
  .lips::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 2px;
    right: 2px;
    height: 1px;
    background: rgba(180, 100, 100, 0.3);
  }
  
  /* Smile highlight */
  .lips::after {
    content: '';
    position: absolute;
    top: 1px;
    left: 50%;
    transform: translateX(-50%);
    width: 16px;
    height: 4px;
    background: rgba(255,200,200,0.3);
    border-radius: 50%;
  }
  
  /* Blush */
  .blush {
    position: absolute;
    top: 52px;
    width: 14px;
    height: 8px;
    background: rgba(220, 140, 140, 0.25);
    border-radius: 50%;
    z-index: 7;
  }
  .blush.left { left: 5px; }
  .blush.right { right: 5px; }
  
  /* Body - blue dress with robe */
  .body {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 160px;
    height: 200px;
    z-index: 3;
  }
  
  .dress {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    height: 180px;
    background: linear-gradient(180deg, #1a3060 0%, #0f2040 50%, #0a1530 100%);
    border-radius: 70px 70px 10px 10px;
    z-index: 3;
  }
  
  /* Academic robe */
  .robe {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 160px;
    height: 180px;
    background: linear-gradient(180deg, rgba(20,20,40,0.95) 0%, rgba(15,15,35,0.9) 100%);
    border-radius: 80px 80px 5px 5px;
    z-index: 4;
    border: 1px solid rgba(200, 170, 110, 0.2);
  }
  
  /* Norse knotwork on robe */
  .robe::before {
    content: 'ᚠ ᚢ ᚦ';
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(200, 170, 110, 0.3);
    font-size: 10px;
    letter-spacing: 8px;
    z-index: 5;
  }
  
  .robe::after {
    content: '';
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(200, 170, 110, 0.4), transparent);
    z-index: 5;
  }
  
  /* Mjölnir pendant */
  .mjolnir {
    position: absolute;
    top: 35px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 6;
  }
  
  .mjolnir-chain {
    width: 1px;
    height: 12px;
    background: rgba(200, 200, 220, 0.6);
    margin: 0 auto;
  }
  
  .mjolnir-hammer {
    width: 12px;
    height: 14px;
    position: relative;
    margin: 0 auto;
  }
  
  .mjolnir-hammer::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 12px;
    height: 6px;
    background: linear-gradient(180deg, #d0d0e0, #a0a0b0);
    border-radius: 2px;
  }
  
  .mjolnir-hammer::after {
    content: '';
    position: absolute;
    top: 5px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 9px;
    background: linear-gradient(180deg, #b0b0c0, #909098);
    border-radius: 0 0 2px 2px;
  }
  
  /* Books in arm */
  .books {
    position: absolute;
    bottom: 30px;
    right: -15px;
    z-index: 5;
  }
  
  .book {
    width: 30px;
    height: 8px;
    border-radius: 1px;
    margin-bottom: 1px;
    box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
  }
  
  .book:nth-child(1) { background: linear-gradient(90deg, #8b4513, #a0522d); }
  .book:nth-child(2) { background: linear-gradient(90deg, #2e4057, #3a5a7c); }
  .book:nth-child(3) { background: linear-gradient(90deg, #4a1942, #6b2d5b); }
  .book:nth-child(4) { background: linear-gradient(90deg, #1a472a, #2d6b3f); }
  
  /* Golden light/glow behind Runa */
  .glow {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(240, 208, 96, 0.15) 0%, rgba(240, 208, 96, 0.05) 40%, transparent 70%);
    z-index: 0;
    animation: glowPulse 4s ease-in-out infinite;
  }
  
  @keyframes glowPulse {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 1; }
  }
  
  /* Stars/particles */
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(200, 200, 255, 0.6);
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite;
  }
  
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
  
  /* Title */
  .title-area {
    position: absolute;
    top: 20px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 20;
  }
  
  .title {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 700;
    color: rgba(200, 170, 110, 0.8);
    letter-spacing: 6px;
    text-transform: uppercase;
  }
  
  .subtitle {
    font-family: 'Raleway', sans-serif;
    font-size: 10px;
    font-weight: 300;
    color: rgba(180, 190, 220, 0.5);
    letter-spacing: 3px;
    margin-top: 4px;
  }
  
  /* Degree list at bottom */
  .degrees {
    position: absolute;
    bottom: 15px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 20;
  }
  
  .degrees-text {
    font-family: 'Cinzel', serif;
    font-size: 7px;
    color: rgba(200, 170, 110, 0.4);
    letter-spacing: 2px;
  }
  
  /* Signature */
  .sig {
    position: absolute;
    bottom: 4px;
    right: 12px;
    font-family: 'Cinzel', serif;
    font-size: 6px;
    color: rgba(200, 170, 110, 0.25);
    z-index: 20;
  }
  
  /* Floating runes animation */
  .floating-rune {
    position: absolute;
    font-size: 14px;
    color: rgba(200, 170, 110, 0.08);
    animation: floatRune 8s ease-in-out infinite;
    z-index: 1;
  }
  
  @keyframes floatRune {
    0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.06; }
    50% { transform: translateY(-15px) rotate(10deg); opacity: 0.12; }
  }
</style>
</head>
<body>
<div class="portrait">
  <div class="rune-border"></div>
  
  <!-- Floating runes background -->
  <div class="floating-rune" style="top:100px;left:40px;animation-delay:0s">ᚠ</div>
  <div class="floating-rune" style="top:200px;right:50px;animation-delay:2s">ᛉ</div>
  <div class="floating-rune" style="top:350px;left:60px;animation-delay:4s">ᛏ</div>
  <div class="floating-rune" style="top:450px;right:40px;animation-delay:1s">ᛊ</div>
  <div class="floating-rune" style="top:550px;left:30px;animation-delay:3s">ᛒ</div>
  <div class="floating-rune" style="top:650px;right:60px;animation-delay:5s">ᛞ</div>
  
  <!-- Stars -->
  <div class="particle" style="top:80px;left:100px;animation-delay:0.5s"></div>
  <div class="particle" style="top:150px;right:120px;animation-delay:1.5s"></div>
  <div class="particle" style="top:250px;left:200px;animation-delay:2.5s"></div>
  <div class="particle" style="top:300px;right:80px;animation-delay:0.8s"></div>
  <div class="particle" style="top:400px;left:150px;animation-delay:3s"></div>
  <div class="particle" style="top:500px;right:200px;animation-delay:1.2s"></div>
  
  <!-- Title -->
  <div class="title-area">
    <div class="title">University of Yggdrasil</div>
    <div class="subtitle">ᛟ Anno MMXL ᛟ</div>
  </div>
  
  <!-- Glow -->
  <div class="glow"></div>
  
  <!-- Yggdrasil silhouette -->
  <div class="yggdrasil"></div>
  
  <!-- Building -->
  <div class="building">
    <div class="roof"></div>
    <div class="facade">
      <div class="door"></div>
      <div class="window"></div>
      <div class="window"></div>
      <div class="window"></div>
      <div class="window"></div>
    </div>
    <div class="dragon-prow"></div>
  </div>
  
  <!-- Runestones -->
  <div class="runestone left"></div>
  <div class="runestone right"></div>
  
  <!-- Holographic displays -->
  <div class="holo left"></div>
  <div class="holo right"></div>
  
  <!-- Runa -->
  <div class="runa">
    <div class="hair"></div>
    <div class="face">
      <div class="brow left"></div>
      <div class="brow right"></div>
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="nose"></div>
      <div class="blush left"></div>
      <div class="blush right"></div>
      <div class="lips"></div>
    </div>
    <div class="body">
      <div class="dress"></div>
      <div class="robe"></div>
      <div class="mjolnir">
        <div class="mjolnir-chain"></div>
        <div class="mjolnir-hammer"></div>
      </div>
      <div class="books">
        <div class="book"></div>
        <div class="book"></div>
        <div class="book"></div>
        <div class="book"></div>
      </div>
    </div>
  </div>
  
  <!-- Degrees -->
  <div class="degrees">
    <div class="degrees-text">BS × 13 · MS × 4 · PhD × 5 · 22 DEGREES · CLASS OF 2040</div>
  </div>
  
  <div class="sig">ᛟ Runa Gridweaver Freyjasdottir ᛟ</div>
</div>
</body>
</html>
